name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "develop", "stage" ]
  pull_request:
    branches: [ "main", "develop", "stage" ]

permissions:
  contents: read

jobs:
  quality-security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Show repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            echo "Installing from requirements.txt"
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping project dependency install."
          fi

      - name: Install CI security and test tools
        run: |
          pip install pytest bandit ruff

      - name: Lint with Ruff
        run: ruff check .

      - name: Run automated tests
        run: python -m pytest -q

      - name: Run Bandit SAST
        run: bandit -c bandit.yaml -r .

  dependency-vulnerability-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit against requirements.txt
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found, skipping dependency scan."
          fi